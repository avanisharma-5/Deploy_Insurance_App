apiVersion: apps/v1
kind: Deployment
metadata:
  name: insurance-app

spec:
  replicas: 2

  strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 0

  selector:
    matchLabels:
      app: insurance

  template:
    metadata:
      labels:
        app: insurance

    spec:
      containers:
      - name: insurance-container
        image: avanis55/insurance-app:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 8501

        env:
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: groq-secret
              key: GROQ_API_KEY