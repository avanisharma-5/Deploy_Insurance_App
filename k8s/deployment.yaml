apiVersion: apps/v1
kind: Deployment
metadata:
  name: insurance-app

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: insurance

  template:
    metadata:
      labels:
        app: insurance

    spec:
      containers:
      - name: insurance-container
        image: avanis55/insurance-app:latest
        ports:
        - containerPort: 8501